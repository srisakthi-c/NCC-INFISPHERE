{% extends "base.html" %}
{% block content %}

<h2>📄 Cadet Documents</h2>

<table>
  <tr>
    <th>Cadet Name</th>
    <th>Document</th>
  </tr>

  {% for doc, cadet in documents %}
  <tr>
    <td>{{ cadet.name }}</td>
    <td>
      <a href="{{ url_for('static', filename='uploads/' + doc.filename) }}" target="_blank">
        View
      </a>
    </td>
  </tr>
  {% endfor %}
</table>

{% endblock %}
